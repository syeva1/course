<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[Название] — [Слоган]</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #1a1a1a; }
.hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
.hero h1 { font-size: 3em; margin-bottom: 20px; }
.hero p { font-size: 1.3em; opacity: 0.9; max-width: 600px; margin: 0 auto 30px; }
.btn { display: inline-block; padding: 15px 40px; background: white; color: #764ba2; border-radius: 30px; text-decoration: none; font-weight: 700; font-size: 1.1em; transition: transform 0.2s; }
.btn:hover { transform: scale(1.05); }
.features { padding: 80px 20px; max-width: 1000px; margin: 0 auto; }
.features h2 { text-align: center; font-size: 2em; margin-bottom: 50px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
.card { padding: 30px; border-radius: 12px; background: #f8f8f8; }
.card h3 { margin-bottom: 10px; color: #764ba2; }
.cta { padding: 80px 20px; text-align: center; background: #1a1a1a; color: white; }
.cta h2 { font-size: 2em; margin-bottom: 20px; }
.cta .btn { background: #764ba2; color: white; }
</style>
</head>
<body>

<section class="hero">
  <div>
    <h1>[Заголовок]</h1>
    <p>[Подзаголовок — что получит пользователь]</p>
    <a href="#" class="btn">[Кнопка CTA]</a>
  </div>
</section>

<section class="features">
  <h2>Почему мы</h2>
  <div class="grid">
    <div class="card">
      <h3>[Преимущество 1]</h3>
      <p>[Описание]</p>
    </div>
    <div class="card">
      <h3>[Преимущество 2]</h3>
      <p>[Описание]</p>
    </div>
    <div class="card">
      <h3>[Преимущество 3]</h3>
      <p>[Описание]</p>
    </div>
  </div>
</section>

<section class="cta">
  <h2>[Призыв к действию]</h2>
  <p style="opacity:0.7;margin-bottom:30px;">[Дополнительный текст]</p>
  <a href="#" class="btn">[Кнопка]</a>
</section>

</body>
</html>
